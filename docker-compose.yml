services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: rival_server
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rival_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://server:5000/api
    depends_on:
      - server
    restart: unless-stopped
